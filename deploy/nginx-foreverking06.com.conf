# Nginx 反代 foreverking06.com → 本机 yingyinren-api（默认 3010）
# 放置路径示例：/etc/nginx/sites-available/foreverking06.com
# 启用：ln -s /etc/nginx/sites-available/foreverking06.com /etc/nginx/sites-enabled/
# 校验：nginx -t && systemctl reload nginx
#
# 证书（Let's Encrypt / Certbot 示例）：
#   certbot certonly --nginx -d foreverking06.com -d www.foreverking06.com
# 证书路径一般为：
#   /etc/letsencrypt/live/foreverking06.com/fullchain.pem
#   /etc/letsencrypt/live/foreverking06.com/privkey.pem

server {
    listen 80;
    listen [::]:80;
    server_name foreverking06.com www.foreverking06.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foreverking06.com www.foreverking06.com;

    ssl_certificate     /etc/letsencrypt/live/foreverking06.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foreverking06.com/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
